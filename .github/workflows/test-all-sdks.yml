name: Test All SDKs

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --all-features
      - name: Run clippy
        run: cargo clippy --workspace --all-features -- -D warnings

  node:
    name: Node.js Tests
    runs-on: ubuntu-latest
    needs: [wasm]
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - name: Build ash-wasm-sdk
        run: |
          cd packages/ash-wasm-sdk
          wasm-pack build --target nodejs
      - name: Install and test ash-node-sdk
        run: |
          cd packages/ash-node-sdk
          npm pkg set dependencies.@3maem/ash-wasm-sdk=file:../ash-wasm-sdk/pkg
          npm install
          npm test

  python:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          cd packages/ash-python-sdk
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          cd packages/ash-python-sdk
          python -m pytest -v

  go:
    name: Go Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Run tests
        run: |
          cd packages/ash-go-sdk
          go test -v -race ./...

  php:
    name: PHP Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, intl, json
          tools: composer:v2
      - name: Install dependencies
        run: |
          cd packages/ash-php-sdk
          composer install --no-progress
      - name: Run tests
        run: |
          cd packages/ash-php-sdk
          vendor/bin/phpunit

  wasm:
    name: WASM Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - name: Run tests
        run: |
          cd packages/ash-wasm-sdk
          wasm-pack test --node

  conformance-guard:
    name: Conformance Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify conformance files are unchanged
        if: env.ALLOW_CONFORMANCE_UPDATE != '1'
        run: |
          GUARDED_FILES=(
            "tests/conformance/vectors.json"
            "tests/conformance/README.md"
            "tests/conformance/schema.json"
            "tests/conformance/LOCKED.md"
          )
          CHANGED=0
          for f in "${GUARDED_FILES[@]}"; do
            if git diff origin/main -- "$f" | grep -q '^diff'; then
              echo "::error::LOCKED file modified: $f"
              echo "  To update conformance files, use the Release/Regenerate workflow"
              echo "  or set ALLOW_CONFORMANCE_UPDATE=1"
              CHANGED=1
            fi
          done
          if [ $CHANGED -ne 0 ]; then
            exit 1
          fi
          echo "All conformance files unchanged — guard passed"

      - name: Validate vectors.json structure
        run: |
          node -e "
          const v = require('./tests/conformance/vectors.json');
          const s = require('./tests/conformance/schema.json');
          if (v.schema_version !== s.schema_version) {
            console.error('schema_version mismatch: vectors=' + v.schema_version + ' schema=' + s.schema_version);
            process.exit(1);
          }
          const cats = Object.keys(v.vectors);
          console.log('Conformance vectors: ' + cats.length + ' categories');
          let total = 0;
          for (const cat of cats) { total += v.vectors[cat].length; }
          console.log('Total vectors: ' + total);
          if (total < 130) {
            console.error('Vector count suspiciously low: ' + total);
            process.exit(1);
          }
          console.log('Conformance guard: OK');
          "
