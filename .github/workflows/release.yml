name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ASH ${{ github.ref_name }}
          body: |
            ## ASH ${{ github.ref_name }}

            **Ash was developed by 3maem Co. | شركة عمائم**

            ### Packages

            | Package | Registry |
            |---------|----------|
            | `ashcore` | crates.io |
            | `@3maem/ash-node-sdk` | npm |
            | `ash-python-sdk` | PyPI |
            | `3maem/ash-php-sdk` | Packagist |
            | `github.com/3maem/ash-go-sdk` | Go Modules |
            | `@3maem/ash-wasm-sdk` | npm |

            ### Installation

            **Node.js:**
            ```bash
            npm install @3maem/ash-node-sdk
            ```

            **Python:**
            ```bash
            pip install ash-python-sdk
            ```

            **PHP:**
            ```bash
            composer require 3maem/ash-php-sdk
            ```

            **Go:**
            ```bash
            go get github.com/3maem/ash-go-sdk
            ```

            **WASM (Browser/Node.js):**
            ```bash
            npm install @3maem/ash-wasm-sdk
            ```

            See CHANGELOG.md for detailed changes.
          draft: false
          prerelease: false

  publish-rust:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish ashcore
        run: cargo publish --package ashcore
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install and build
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Publish
        run: npm publish --workspace=packages/ash-node-sdk --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        working-directory: packages/ash-python-sdk
        run: python -m build

      - name: Publish to PyPI
        working-directory: packages/ash-python-sdk
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  publish-packagist:
    name: Publish to Packagist
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Trigger Packagist update
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{\"repository\":{\"url\":\"https://github.com/3maem/ashcore\"}}" \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_API_TOKEN}"

  publish-wasm:
    name: Publish WASM to npm
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM package
        working-directory: packages/ash-wasm-sdk
        run: wasm-pack build --target bundler

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        working-directory: packages/ash-wasm-sdk/pkg
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
